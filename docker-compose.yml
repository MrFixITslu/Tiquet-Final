services:
  v79-tiquet-manager:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: v79-tiquet-manager
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3020
      # Automatically detected by standard Nginx reverse proxy containers (e.g. jwilder/nginx-proxy, Nginx Proxy Manager)
      - VIRTUAL_HOST=tiquet.v79sl.duckdns.org
      - VIRTUAL_PORT=3020
      - LETSENCRYPT_HOST=tiquet.v79sl.duckdns.org
    ports:
      - "3020:3020"
    volumes:
      - tiquet_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3020/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # Uncomment and replace the network name if you want to attach to an existing proxy network
    # networks:
    #   - proxy-network

volumes:
  tiquet_data:

