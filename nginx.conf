server {
    listen 4010;
    server_name tiquet.v79sl.duckdns.org;

    # Gzip Compression for high-performance asset delivery
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' https: http: 'unsafe-inline' 'unsafe-eval' data: blob:;" always;

    # Root folder containing build files
    root /usr/share/nginx/html;
    index index.html;

    # Cache Control for static assets (Vite hashes output files)
    location ~* \.(?:css|js|woff2?|eot|ttf|otf|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # SPA Routing Fallback and cache prevention for index.html
    location / {
        try_files $uri $uri/ /index.html;
        
        # Ensure browsers always fetch the latest index.html so updates are immediate
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    }

    # Error handling pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
