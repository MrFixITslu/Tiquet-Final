# OPTIONAL: reverse proxy in front of the Node app (docker-compose exposes
# the app directly on port 8080). Use this if you want Nginx on the host to
# terminate TLS and forward to the container - point server_name/ssl_* at
# your own domain and certs.
server {
    listen 80;
    server_name your-domain.example.com;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
